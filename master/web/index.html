<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Database - Master GUI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6">🗄️ Distributed Database System</h1>
        
        <!-- Worker Status -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <h2 class="text-xl font-semibold mb-3">Node Status</h2>
            <div id="workerStatus" class="flex gap-4">
                <span class="px-3 py-1 rounded-full bg-gray-200">Loading...</span>
            </div>
        </div>

        <!-- Two-column layout -->
        <div class="grid grid-cols-3 gap-6">
            <!-- Left: Databases -->
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-xl font-semibold mb-3">📁 Databases</h2>
                <div id="databasesList" class="space-y-2"></div>
                <button onclick="createDatabase()" class="mt-4 w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
                    + New Database
                </button>
            </div>

            <!-- Middle: Tables -->
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-xl font-semibold mb-3">📋 Tables</h2>
                <div id="tablesList" class="space-y-2"></div>
                <button id="createTableBtn" onclick="showCreateTableModal()" class="mt-4 w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
                    + New Table
                </button>
            </div>

            <!-- Right: Records -->
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-xl font-semibold mb-3">📝 Records</h2>
                <div id="recordsContent" class="overflow-x-auto">
                    <p class="text-gray-500">Select a table to view records</p>
                </div>
                <button onclick="showInsertModal()" class="mt-4 w-full bg-green-500 text-white py-2 rounded hover:bg-green-600">
                    + Insert Record
                </button>
            </div>
        </div>

        <!-- Query Editor -->
        <div class="bg-white rounded-lg shadow p-4 mt-6">
            <h2 class="text-xl font-semibold mb-3">🔍 Execute Query</h2>
            <textarea id="queryInput" rows="3" class="w-full border rounded p-2 font-mono text-sm" 
                placeholder='{"operation": "select", "database": "company", "table": "employees"}'></textarea>
            <button onclick="executeQuery()" class="mt-2 bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">
                ▶ Run
            </button>
            <pre id="queryResult" class="mt-3 bg-gray-900 text-green-400 p-3 rounded overflow-x-auto text-sm hidden"></pre>
        </div>
    </div>

    <script src="/ui/script.js"></script>
</body>
</html>
